version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: data-ai-literacy-db
    environment:
      POSTGRES_USER: dataai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-insecure_password}
      POSTGRES_DB: data_ai_literacy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataai-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: data-ai-literacy-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataai-network

  # Python Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data-ai-literacy-backend
    environment:
      DATABASE_URL: postgresql://dataai:${DB_PASSWORD:-insecure_password}@postgres:5432/data_ai_literacy
      REDIS_URL: redis://redis:6379
      ENV: ${ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dataai-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data-ai-literacy-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ENV: ${ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm start
    networks:
      - dataai-network

  # Jupyter Lab for interactive learning
  jupyter:
    image: jupyter/datascience-notebook:latest
    container_name: data-ai-literacy-jupyter
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./datasets:/home/jovyan/datasets
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    networks:
      - dataai-network

  # MinIO for object storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: data-ai-literacy-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - dataai-network

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: data-ai-literacy-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - dataai-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  dataai-network:
    driver: bridge
